[build]
  command = "npm ci && npm run build"
  publish = "dist"

# Optional: basic security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# If you later add a custom 404, update here.
